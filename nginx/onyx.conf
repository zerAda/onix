# =============================================================================
# nginx — point d'entrée unique de la stack onix (Onyx).
# Routage minimal et auditable, dérivé du template officiel Onyx :
#   /api/*  +  /openapi.json   -> api_server:8080 (préfixe /api retiré)
#   /                          -> web_server:3000 (frontend Next.js)
# Support WebSocket (streaming des réponses) + upload jusqu'à 5 Go.
# Le conteneur n'est lié qu'à 127.0.0.1 côté hôte (cf. docker-compose.yml).
# =============================================================================

upstream api_server {
    server api_server:8080 fail_timeout=0;
}

upstream web_server {
    server web_server:3000 fail_timeout=0;
}

# N'active "Connection: upgrade" que pour les vraies requêtes WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;

    # Durcissement (cf. docs/SECURITY.md) :
    #   - server_tokens off : ne pas divulguer la version de nginx (Server: nginx).
    #   - En-têtes de sécurité appliqués à TOUTES les réponses (always), y compris
    #     les pages d'erreur. `add_header` est hérité dans les `location` tant
    #     qu'aucun `add_header` local ne les écrase (ce n'est pas le cas ici).
    server_tokens off;
    add_header X-Content-Type-Options    nosniff                        always;
    add_header X-Frame-Options           SAMEORIGIN                     always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    client_max_body_size 5G;          # taille max d'upload de documents

    # Sonde de santé servie par nginx (utilisée par le healthcheck du conteneur).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # API + OpenAPI : on retire le préfixe /api avant de proxifier.
    location ~ ^/(api|openapi.json)(/.*)?$ {
        rewrite ^/api(/.*)$ $1 break;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        # Délais larges : certaines requêtes LLM/indexation sont longues.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://api_server;
    }

    # Tout le reste -> frontend.
    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://web_server;
    }
}
