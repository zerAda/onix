# =============================================================================
# nginx — point d'entrée unique de la stack onix (Onyx).
# Routage minimal et auditable, dérivé du template officiel Onyx :
#   /api/*  +  /openapi.json   -> api_server:8080 (préfixe /api retiré)
#   /                          -> web_server:3000 (frontend Next.js)
# Support WebSocket (streaming des réponses) + upload jusqu'à 5 Go.
# Le conteneur n'est lié qu'à 127.0.0.1 côté hôte (cf. docker-compose.yml).
# =============================================================================

upstream api_server {
    server api_server:8080 fail_timeout=0;
}

upstream web_server {
    server web_server:3000 fail_timeout=0;
}

# N'active "Connection: upgrade" que pour les vraies requêtes WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;

    # Durcissement (cf. docs/SECURITY.md) :
    #   - server_tokens off : ne pas divulguer la version de nginx (Server: nginx).
    #   - En-têtes de sécurité appliqués à TOUTES les réponses (always), y compris
    #     les pages d'erreur. `add_header` est hérité dans les `location` tant
    #     qu'aucun `add_header` local ne les écrase (ce n'est pas le cas ici).
    server_tokens off;
    add_header X-Content-Type-Options    nosniff                        always;
    add_header X-Frame-Options           SAMEORIGIN                     always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    client_max_body_size 5G;          # taille max d'upload de documents

    # Sonde de santé servie par nginx (utilisée par le healthcheck du conteneur).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # -------------------------------------------------------------------------
    # Surcouche de branding GEREP (thème CSS, logo, favicon).
    # Fichiers statiques montés en lecture seule depuis ./nginx/branding
    # (cf. docker-compose.yml : volume ./nginx/branding:/etc/nginx/branding:ro).
    # Sert /onix-branding/gerep-theme.css, /onix-branding/favicon.svg, etc.
    # -------------------------------------------------------------------------
    location /onix-branding/ {
        alias /etc/nginx/branding/;
        # On reste tolérant à l'absence d'un fichier (404 propre, pas d'erreur).
        try_files $uri =404;

        # Cache raisonnable : 1h navigateur, revalidation possible. Le CSS peut
        # évoluer pendant les réglages → pas d'immutable, pas de cache trop long.
        add_header Cache-Control "public, max-age=3600" always;

        # `add_header` local écrase l'héritage du bloc server : on RE-déclare les
        # en-têtes de sécurité pour ne pas les perdre sur ces ressources.
        add_header X-Content-Type-Options    nosniff                         always;
        add_header X-Frame-Options           SAMEORIGIN                      always;
        add_header Referrer-Policy           strict-origin-when-cross-origin always;
    }

    # API + OpenAPI : on retire le préfixe /api avant de proxifier.
    location ~ ^/(api|openapi.json)(/.*)?$ {
        rewrite ^/api(/.*)$ $1 break;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        # Délais larges : certaines requêtes LLM/indexation sont longues.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://api_server;
    }

    # Tout le reste -> frontend.
    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;

        # --- Surcouche de branding GEREP (injection HTML via sub_filter) ------
        # On demande à l'amont (Next.js) de NE PAS compresser pour que sub_filter
        # puisse réécrire le HTML (sub_filter ne sait pas lire du gzip/br).
        proxy_set_header Accept-Encoding "";

        # sub_filter ne s'applique par défaut qu'à `text/html` (cf. directive
        # sub_filter_types, défaut = text/html) → JSON/API/JS/CSS/binaire restent
        # intacts. On ne la redéclare pas pour éviter un doublon de type MIME.
        # Remplace TOUTES les occurrences (et pas seulement la 1re).
        sub_filter_once off;
        # Injecte le thème + le favicon GEREP juste avant la fermeture du <head>.
        # Le CSS est chargé en dernier → il gagne en cascade sur les styles Onyx.
        sub_filter '</head>'
            '<link rel="stylesheet" href="/onix-branding/gerep-theme.css"><link rel="icon" type="image/svg+xml" href="/onix-branding/favicon.svg"></head>';
        # Nom d'app (onglet navigateur) : le whitelabel admin est EE-only (cf.
        # docs/BRANDING_GEREP.md) → on réécrit le <title> ici, en FOSS. Best-effort :
        # no-op si le titre rendu diffère ; Next.js peut le re-fixer côté client
        # après hydratation (titre affiché des conversations) — caveat documenté.
        sub_filter '<title>Onyx</title>' '<title>GEREP — Assistant Client 360</title>';
        # Réécriture des libellés produit visibles (FOSS, best-effort comme le titre :
        # le texte rendu côté client par Next.js après hydratation peut revenir à
        # « Onyx » — le rebranding fiable du nom est EE/whitelabel). Le CSS de thème
        # (couleurs GEREP) lui, s'applique pleinement.
        sub_filter 'Welcome to Onyx' 'Assistant Client 360 — GEREP';
        sub_filter 'Your open source AI platform for work' 'Votre assistant client souverain et local';
        sub_filter 'New to Onyx?' 'Nouveau sur la plateforme ?';
        # ----------------------------------------------------------------------

        proxy_pass http://web_server;
    }
}
