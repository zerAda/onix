# =============================================================================
# nginx — variante de PRODUCTION (derrière le reverse-proxy TLS Caddy).
# -----------------------------------------------------------------------------
# Dérivée de nginx/onyx.conf (routage IDENTIQUE : /api -> api_server, / -> web,
# WebSocket, upload 5 Go, en-têtes de sécurité), avec UNE adaptation nécessaire :
#
#   En prod, nginx est un hop INTERNE derrière Caddy (qui termine TLS sur :443).
#   La requête arrive donc sur nginx en http (réseau onix-net) : `$scheme` vaut
#   `http`. Pour qu'Onyx génère des URLs/callbacks OIDC et des cookies sécurisés
#   corrects, on PROPAGE le contexte TLS réel transmis par Caddy via les en-têtes
#   X-Forwarded-* (Proto/Host/Port), avec repli propre si l'en-tête est absent.
#
# Montée par la surcouche deploy/prod/docker-compose.prod.yml (override du volume
# nginx). Le fichier nginx/onyx.conf de la BASE n'est PAS modifié.
# =============================================================================

upstream api_server {
    server api_server:8080 fail_timeout=0;
}

upstream web_server {
    server web_server:3000 fail_timeout=0;
}

# N'active "Connection: upgrade" que pour les vraies requêtes WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Honore le protocole d'ORIGINE transmis par Caddy (https). Repli sur $scheme
# (http interne) si l'en-tête est absent (accès direct hors Caddy).
map $http_x_forwarded_proto $fwd_proto {
    ''      $scheme;
    default $http_x_forwarded_proto;
}
# Idem pour l'hôte d'origine (domaine public) : repli sur $host.
map $http_x_forwarded_host $fwd_host {
    ''      $host;
    default $http_x_forwarded_host;
}
# Port d'origine : 443 quand Caddy a relayé https, sinon le port local.
map $fwd_proto $fwd_port {
    https   443;
    default $server_port;
}

# =============================================================================
# CHEMIN CHAT -> PASSERELLE RBAC (access-gateway) — câblage + anti-usurpation.
# -----------------------------------------------------------------------------
# Le navigateur appelle /api/chat/send-message. En prod, Caddy a déjà :
#   1. authentifié l'appelant via oauth2-proxy (forward_auth) ;
#   2. recopié l'identité VÉRIFIÉE dans X-Auth-Request-User (= oid Entra) et
#      X-Auth-Request-Preferred-Username (= upn) ;
#   3. SUPPRIMÉ tout X-OIDC-Claims / X-Auth-Request-* entrant (anti-usurpation au
#      bord). On le re-supprime ici (défense en profondeur) puis on (re)construit
#      X-OIDC-Claims UNIQUEMENT à partir des en-têtes vérifiés.
#
# La passerelle attend X-OIDC-Claims = JSON. En mode GATEWAY_GROUP_SOURCE=graph
# (défaut prod), elle n'a besoin QUE de `oid` (+ `upn`) : elle résout les groupes
# via Microsoft Graph. On n'injecte donc PAS de tableau `groups` ici (un tableau
# JSON fiable n'est pas reconstructible depuis la chaîne CSV d'oauth2-proxy en
# nginx pur, sans njs) — cf. docs/DEPLOY_PROD.md §5bis (limite assumée + options).
# Repli : oid ABSENT (ex. session non vérifiée) => claims VIDES => 401 passerelle.
upstream access_gateway {
    server access-gateway:8200 fail_timeout=0;
}

# Drapeau "oid vérifié présent ?" (1/0). IMPORTANT : un `map` n'INTERPOLE PAS les
# variables à l'intérieur d'une chaîne (seule une variable SEULE est expansée) ;
# on ne peut donc PAS y composer le JSON. On dérive juste un drapeau, et le JSON
# est assemblé par `set` (qui, lui, interpole) dans la `location` du chat.
map $http_x_auth_request_user $has_verified_oid {
    default 1;
    ''      0;
}

server {
    listen 80 default_server;

    server_tokens off;
    add_header X-Content-Type-Options    nosniff                        always;
    add_header X-Frame-Options           SAMEORIGIN                     always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    client_max_body_size 5G;          # taille max d'upload de documents

    # Sonde de santé servie par nginx (utilisée par le healthcheck du conteneur).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # -------------------------------------------------------------------------
    # CHEMIN CHAT -> PASSERELLE RBAC. `location =` (match EXACT) => priorité sur
    # le regex /api ci-dessous : toute requête chat traverse la passerelle.
    # On réécrit /api/chat/send-message -> /v1/chat/send-message (endpoint de la
    # passerelle), qui force le filtre Document Set puis relaie vers Onyx.
    # -------------------------------------------------------------------------
    location = /api/chat/send-message {
        # --- Construction de X-OIDC-Claims à partir de l'identité VÉRIFIÉE -------
        # `set` INTERPOLE les variables (contrairement à `map`). On part d'une
        # valeur VIDE (fail-closed : pas d'identité => la passerelle répond 401)...
        set $oidc_claims_json "";
        # ...et on ne compose le JSON QUE si oauth2-proxy a fourni un oid vérifié.
        # oid (GUID) et upn (e-mail) Entra ne contiennent aucun caractère JSON à
        # échapper -> pas d'échappement requis (cf. docs/DEPLOY_PROD.md §5bis).
        if ($has_verified_oid) {
            set $oidc_claims_json '{"oid":"$http_x_auth_request_user","sub":"$http_x_auth_request_user","upn":"$http_x_auth_request_preferred_username"}';
        }
        # Anti-usurpation : on (re)pose X-OIDC-Claims UNIQUEMENT depuis cette valeur
        # construite (Caddy a déjà supprimé tout en-tête entrant). proxy_set_header
        # remplace donc toute valeur cliente résiduelle par l'identité vérifiée.
        proxy_set_header X-OIDC-Claims $oidc_claims_json;

        # Réécrit vers l'endpoint réel de la passerelle.
        rewrite ^/api/chat/send-message$ /v1/chat/send-message break;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Forwarded-Port $fwd_port;
        proxy_set_header Host $fwd_host;

        proxy_http_version 1.1;
        # Streaming SSE/NDJSON de la passerelle : on DÉSACTIVE la mise en tampon
        # pour relayer la réponse token-par-token (cf. docs/STREAMING.md).
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://access_gateway;
    }

    # API + OpenAPI : on retire le préfixe /api avant de proxifier.
    location ~ ^/(api|openapi.json)(/.*)?$ {
        rewrite ^/api(/.*)$ $1 break;

        # Anti-usurpation : aucune route Onyx native ne doit transporter un
        # X-OIDC-Claims (seul le chemin chat ci-dessus le porte, vérifié).
        proxy_set_header X-OIDC-Claims "";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Forwarded-Port $fwd_port;
        proxy_set_header Host $fwd_host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://api_server;
    }

    # Tout le reste -> frontend.
    location / {
        # Anti-usurpation : le frontend ne doit jamais relayer X-OIDC-Claims.
        proxy_set_header X-OIDC-Claims "";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Forwarded-Port $fwd_port;
        proxy_set_header Host $fwd_host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://web_server;
    }
}
