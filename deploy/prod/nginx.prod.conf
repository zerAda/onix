# =============================================================================
# nginx — variante de PRODUCTION (derrière le reverse-proxy TLS Caddy).
# -----------------------------------------------------------------------------
# Dérivée de nginx/onyx.conf (routage IDENTIQUE : /api -> api_server, / -> web,
# WebSocket, upload 5 Go, en-têtes de sécurité), avec UNE adaptation nécessaire :
#
#   En prod, nginx est un hop INTERNE derrière Caddy (qui termine TLS sur :443).
#   La requête arrive donc sur nginx en http (réseau onix-net) : `$scheme` vaut
#   `http`. Pour qu'Onyx génère des URLs/callbacks OIDC et des cookies sécurisés
#   corrects, on PROPAGE le contexte TLS réel transmis par Caddy via les en-têtes
#   X-Forwarded-* (Proto/Host/Port), avec repli propre si l'en-tête est absent.
#
# Montée par la surcouche deploy/prod/docker-compose.prod.yml (override du volume
# nginx). Le fichier nginx/onyx.conf de la BASE n'est PAS modifié.
# =============================================================================

upstream api_server {
    server api_server:8080 fail_timeout=0;
}

upstream web_server {
    server web_server:3000 fail_timeout=0;
}

# N'active "Connection: upgrade" que pour les vraies requêtes WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Honore le protocole d'ORIGINE transmis par Caddy (https). Repli sur $scheme
# (http interne) si l'en-tête est absent (accès direct hors Caddy).
map $http_x_forwarded_proto $fwd_proto {
    ''      $scheme;
    default $http_x_forwarded_proto;
}
# Idem pour l'hôte d'origine (domaine public) : repli sur $host.
map $http_x_forwarded_host $fwd_host {
    ''      $host;
    default $http_x_forwarded_host;
}
# Port d'origine : 443 quand Caddy a relayé https, sinon le port local.
map $fwd_proto $fwd_port {
    https   443;
    default $server_port;
}

server {
    listen 80 default_server;

    server_tokens off;
    add_header X-Content-Type-Options    nosniff                        always;
    add_header X-Frame-Options           SAMEORIGIN                     always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    client_max_body_size 5G;          # taille max d'upload de documents

    # Sonde de santé servie par nginx (utilisée par le healthcheck du conteneur).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # API + OpenAPI : on retire le préfixe /api avant de proxifier.
    location ~ ^/(api|openapi.json)(/.*)?$ {
        rewrite ^/api(/.*)$ $1 break;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Forwarded-Port $fwd_port;
        proxy_set_header Host $fwd_host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://api_server;
    }

    # Tout le reste -> frontend.
    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Forwarded-Port $fwd_port;
        proxy_set_header Host $fwd_host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_redirect off;
        proxy_pass http://web_server;
    }
}
