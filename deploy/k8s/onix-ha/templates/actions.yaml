{{- /*
onix-actions — microservice applicatif (audit OCR, génération .docx, tâches,
notification, usage, coût, admin). Stateless en HA : replicas>=2 + HPA + PDB.
État DÉPORTÉ (Postgres/Redis/MinIO) au lieu du SQLite local — voir le hook code
dans docs/HA_SCALING.md. Gouverné par clé API (Secret) + kill-switch (ConfigMap).
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onix.fullname" . }}-actions
  labels:
    {{- include "onix.componentLabels" (dict "ctx" . "component" "actions") | nindent 4 }}
spec:
  {{- if not .Values.actions.autoscaling.enabled }}
  replicas: {{ .Values.actions.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "onix.componentSelector" (dict "ctx" . "component" "actions") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "onix.componentLabels" (dict "ctx" . "component" "actions") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- include "onix.podAntiAffinity" (dict "ctx" . "component" "actions") | nindent 6 }}
      {{- include "onix.podSecurityContext" (dict "ctx" . "cfg" .Values.actions.securityContext) | nindent 6 }}
      containers:
        - name: actions
          image: "{{ .Values.actions.image.repository }}:{{ .Values.actions.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.actions.port }}
          envFrom:
            - configMapRef:
                name: {{ include "onix.fullname" . }}-config
          env:
            - name: ONIX_ACTIONS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "onix.secretName" . }}
                  key: ONIX_ACTIONS_API_KEY
            {{- include "onix.actionsSecretEnv" . | nindent 12 }}
            {{- include "onix.dataTierSecretEnv" . | nindent 12 }}
            {{- if .Values.actionsQueue.enabled }}
            - name: BROKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "onix.secretName" . }}
                  key: BROKER_PASSWORD
            - name: ONIX_BROKER_URL
              value: {{ include "onix.brokerUrl" . | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          resources:
            {{- toYaml .Values.actions.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "onix.fullname" . }}-actions
  labels:
    {{- include "onix.componentLabels" (dict "ctx" . "component" "actions") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.actions.port }}
      targetPort: http
      name: http
  selector:
    {{- include "onix.componentSelector" (dict "ctx" . "component" "actions") | nindent 4 }}
{{- if .Values.actions.autoscaling.enabled }}
---
{{ include "onix.hpa" (dict "ctx" . "component" "actions" "target" (printf "%s-actions" (include "onix.fullname" .)) "cfg" .Values.actions.autoscaling) }}
{{- end }}
{{- if .Values.actions.pdb.enabled }}
---
{{ include "onix.pdb" (dict "ctx" . "component" "actions" "cfg" .Values.actions.pdb) }}
{{- end }}
