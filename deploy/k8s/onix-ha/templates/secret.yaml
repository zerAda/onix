{{- /*
Secret applicatif — RENDU UNIQUEMENT si secrets.create=true (démo/CI éphémère).
En production : créez le Secret HORS-CHART (existingSecret) — aucun secret dans Git.
Clés attendues (lues par les Deployments) :
  POSTGRES_PASSWORD, OPENSEARCH_ADMIN_PASSWORD, REDIS_PASSWORD,
  S3_AWS_ACCESS_KEY_ID, S3_AWS_SECRET_ACCESS_KEY, SECRET, USER_AUTH_SECRET,
  # Chiffrement AU REPOS des secrets connecteurs/LLM Onyx (sinon EN CLAIR en base,
  # sans erreur au boot — cf. _helpers.tpl onix.dataTierSecretEnv) :
  ENCRYPTION_KEY_SECRET,
  ONIX_ACTIONS_API_KEY, BROKER_PASSWORD,
  # onix-actions WS2 (sinon /admin/* en 403 + audit en SHA-256 dégradé) :
  ONIX_ACTIONS_ADMIN_KEY, ONIX_ACTIONS_AUDIT_HMAC_KEY, ONIX_ACTIONS_CALLER_HMAC_SECRET
  # access-gateway (uniquement si accessGateway.enabled=true) :
  GATEWAY_CACHE_HMAC_SECRET, GATEWAY_AUDIT_SALT, GATEWAY_ONYX_API_KEY,
  GATEWAY_GRAPH_CLIENT_ID, GATEWAY_GRAPH_CLIENT_SECRET,
  GATEWAY_CACHE_REDIS_URL  (ex: rediss://:<clé>@<REDIS_FQDN>:6380/1 — TLS)
*/ -}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "onix.secretName" . }}
  labels:
    {{- include "onix.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
