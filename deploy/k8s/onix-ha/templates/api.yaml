{{- /* API Onyx (FastAPI) — stateless, replicas>=2, HPA, PDB. */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onix.fullname" . }}-api
  labels:
    {{- include "onix.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "onix.componentSelector" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "onix.componentLabels" (dict "ctx" . "component" "api") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- include "onix.podAntiAffinity" (dict "ctx" . "component" "api") | nindent 6 }}
      containers:
        - name: api
          image: {{ include "onix.image" (dict "image" .Values.api.image "root" .) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - "echo 'Starting Onyx Api Server' && uvicorn onyx.main:app --host 0.0.0.0 --port {{ .Values.api.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "onix.fullname" . }}-config
          env:
            {{- include "onix.dataTierSecretEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "onix.fullname" . }}-api
  labels:
    {{- include "onix.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      name: http
  selector:
    {{- include "onix.componentSelector" (dict "ctx" . "component" "api") | nindent 4 }}
{{- if .Values.api.autoscaling.enabled }}
---
{{ include "onix.hpa" (dict "ctx" . "component" "api" "target" (printf "%s-api" (include "onix.fullname" .)) "cfg" .Values.api.autoscaling) }}
{{- end }}
{{- if .Values.api.pdb.enabled }}
---
{{ include "onix.pdb" (dict "ctx" . "component" "api" "cfg" .Values.api.pdb) }}
{{- end }}
