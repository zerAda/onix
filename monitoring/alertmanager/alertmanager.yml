# =============================================================================
# onix — Alertmanager : routage et notification des alertes Prometheus.
# -----------------------------------------------------------------------------
# Local-first : par défaut, AUCUNE notification sortante (récepteur `null` /
# journalisation). Pour notifier réellement, décommentez le récepteur `webhook`
# et renseignez l'URL (Slack/Mattermost/Teams-compatible) — la MÊME convention
# que ONIX_NOTIFY_WEBHOOK côté onix-actions. Aucun secret n'est committé : passez
# l'URL via la variable d'environnement ALERT_WEBHOOK_URL (cf. compose).
# =============================================================================
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "component"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Les alertes critiques sont notifiées plus vite et répétées plus souvent.
    - matchers:
        - severity = critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h
    # Le budget dépassé est une alerte « métier » prioritaire.
    - matchers:
        - component = finops
      receiver: critical
      group_wait: 10s

receivers:
  # Récepteur par défaut : ne notifie nulle part (local, sans secret).
  - name: default

  - name: critical
    # Décommentez pour activer la notification webhook (URL via env, non committée).
    # webhook_configs:
    #   - url: "${ALERT_WEBHOOK_URL}"
    #     send_resolved: true

inhibit_rules:
  # Une alerte critique sur un composant masque les warnings du même composant.
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["component"]
