# =============================================================================
# onix — Loki : agrégation de logs (mono-binaire, stockage local sur disque).
# -----------------------------------------------------------------------------
# Profil « petit déploiement / poste local » : pas d'object store externe, pas
# d'anneau distribué. Rétention bornée pour ne pas saturer le disque.
# =============================================================================
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h          # 7 jours de logs conservés
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  enable_api: true

# Confidentialité : aucune télémétrie sortante (souveraineté).
analytics:
  reporting_enabled: false
