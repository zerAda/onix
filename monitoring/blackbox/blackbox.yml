# =============================================================================
# onix — Blackbox exporter : modules de sonde HTTP « boîte noire ».
# -----------------------------------------------------------------------------
# Sonde la disponibilité des endpoints de santé SANS dépendre des métriques
# applicatives — complément de onix-actions /metrics (p. ex. si le process est
# figé). Le service actions /health renvoie 200 sans authentification.
# =============================================================================
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      fail_if_not_ssl: false
      preferred_ip_protocol: ip4
