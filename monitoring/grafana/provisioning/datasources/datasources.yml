# =============================================================================
# onix — Grafana : sources de données auto-provisionnées (Prometheus + Loki).
# Aucune action manuelle : Grafana les crée au démarrage. 100 % interne.
# =============================================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    jsonData:
      maxLines: 1000
